services:
  postgres:
    image: postgres:16-alpine
    container_name: arber-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: arber
      POSTGRES_PASSWORD: arber
      POSTGRES_DB: arber
    ports:
      - "5433:5432"
    volumes:
      - arber-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arber -d arber"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "work_mem=16MB"

volumes:
  arber-pgdata:
